<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Notes App</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 20px;
}

h2 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 8px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  font-size: 16px;
}

.note {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.delete-btn {
  background: red;
  margin-top: 5px;
}

.complete-btn{
background: green;
margin-top:5px;
}

.incomplete-btn{
background: orange;
margin-top:5px;
}

.delete-btn{
background:red;
margin-top:5px;
}
  
#reportBox{
margin-top:20px;
text-align:center;
}

.progress{
width:100%;
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#progressBar{
height:20px;
width:0%;
background:green;
transition:0.4s;
}
  
</style>
  <link rel="manifest" href="manifest.json">
</head>

<body>

<h2>📝 My Notes</h2>

<textarea id="noteInput" placeholder="Write your note here..."></textarea>
<button onclick="addNote()">Add Note</button>

  <div id="reportBox">
<h3>Task Completion</h3>
<p id="completionText">0% completed</p>

<div class="progress">
<div id="progressBar"></div>
</div>
</div>

<div id="notesContainer"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

function renderNotes() {

const container = document.getElementById("notesContainer");
container.innerHTML = "";

notes.forEach((note, index) => {

const div = document.createElement("div");
div.className = "note";

div.innerHTML = `
${note.text}
<br>

<button class="complete-btn" onclick="markComplete(${index})">Complete</button>

<button class="incomplete-btn" onclick="markIncomplete(${index})">Incomplete</button>

<button class="delete-btn" onclick="deleteNote(${index})">Delete</button>
`;

container.appendChild(div);

});

updateCompletion();

}

function addNote() {
  const input = document.getElementById("noteInput");
  if(input.value.trim() === "") return;

 notes.push({
text: input.value,
completed: false
});
  saveNotes();
  renderNotes();
  input.value = "";
}

function deleteNote(index) {
  notes.splice(index, 1);
  saveNotes();
  renderNotes();
}

  function markComplete(index){

notes[index].completed = true;

saveNotes();

renderNotes();

}

  function markIncomplete(index){

notes[index].completed = false;

saveNotes();

renderNotes();

}

  function toggleTask(index){

notes[index].completed = !notes[index].completed;

saveNotes();

renderNotes();

}
  function updateCompletion(){

let total = notes.length;

let completed = notes.filter(note => note.completed).length;

let percent = total === 0 ? 0 : Math.round((completed/total)*100);

document.getElementById("completionText").innerText =
completed + " of " + total + " tasks completed (" + percent + "%)";

document.getElementById("progressBar").style.width = percent + "%";

}

renderNotes();
</script>

  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
  </script>

</body>
</html>
