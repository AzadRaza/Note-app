<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>📝 Task Tracker</h1>
<p class="subtitle">Track your weekly productivity</p>

<!-- TASK INPUT -->
<div class="card">

<input id="taskTitle" placeholder="Task title (max 100 characters)">

<button id="toggleNotes">+ Add Notes</button>

<textarea id="taskNotes" placeholder="Notes (optional)" style="display:none"></textarea>

<button onclick="addTask()">Add Task</button>

</div>

<!-- WEEKLY PROGRESS -->

<div class="card">

<h3>Weekly Progress</h3>

<div id="progressText"></div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

</div>

<!-- PENDING TASKS -->

<div class="card">

<h3 id="pendingTitle">Pending Tasks</h3>

<div id="pending"></div>

</div>

<!-- COMPLETED TASKS -->

<div class="card">

<h3 id="completedTitle">Completed Tasks</h3>

<div id="completed"></div>

</div>

<!-- WEEKLY REPORT -->

<div class="card">

<h3>Weekly Report</h3>

<div id="report"></div>

</div>

<!-- SETTINGS -->

<div class="card">

<h3>Settings</h3>

<button onclick="exportTasks()">Export Tasks</button>

<input type="file" id="importFile">

<button onclick="importTasks()">Import Tasks</button>

<button onclick="resetTasks()">Reset All Tasks</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
